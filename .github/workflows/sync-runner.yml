name: Sync Runner (Reusable)

# Called by user repos via:
#   uses: aqn96/gitleetnotes/.github/workflows/sync-runner.yml@main
on:
  workflow_call:
    secrets:
      LEETCODE_SESSION:
        required: true
      LEETCODE_CSRF:
        required: true
      GEMINI_API_KEY:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your notes repo
        uses: actions/checkout@v4
        # Checks out the calling repo (user's notes) into $GITHUB_WORKSPACE

      - name: Checkout GitLeetNotes runner
        uses: actions/checkout@v4
        with:
          repository: aqn96/gitleetnotes
          path: _runner
          # Checks out the scripts into $GITHUB_WORKSPACE/_runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _runner/requirements.txt

      - name: Run sync
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF: ${{ secrets.LEETCODE_CSRF }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Runs from $GITHUB_WORKSPACE so solutions/, progress.json, README.md
        # are written into the user's notes repo, not the runner checkout.
        run: python _runner/src/main.py

      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Exclude the runner checkout from commits
          git rm -r --cached _runner 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new solutions today."
          else
            git commit -m "chore: sync LeetCode solutions [$(date -u +%Y-%m-%d)]"
            git push
          fi
